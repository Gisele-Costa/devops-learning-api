name: Stage 1 - Lint & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint Code
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with Flake8
        run: |
          echo "🔍 Running Flake8 linter..."
          flake8 app/ tests/ --count --show-source --statistics
          echo "✅ Flake8 checks passed!"

      - name: Format check with Black
        run: |
          echo "🎨 Checking code formatting..."
          black --check app/ tests/
          echo "✅ Black format check passed!"

      - name: Import sorting check with isort
        run: |
          echo "📦 Checking import sorting..."
          isort --check-only app/ tests/
          echo "✅ isort checks passed!"

  test:
    runs-on: ubuntu-latest
    name: Run Tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with pytest
        run: |
          echo "🧪 Running tests..."
          pytest --verbose --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: |
            htmlcov/
            coverage.xml

  summary:
    runs-on: ubuntu-latest
    name: Summary
    needs: [lint, test]
    if: always()
    
    steps:
      - name: Check workflow status
        run: |
          if [ "${{ needs.lint.result }}" == "failure" ] || [ "${{ needs.test.result }}" == "failure" ]; then
            echo "❌ Lint or Test failed!"
            exit 1
          fi
          echo "✅ All checks passed!"
