name: Stage 4 - Security Scanning

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  dependency-scan:
    runs-on: ubuntu-latest
    name: Dependency Scanning
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bandit (security linter)
        run: |
          echo "🔐 Running Bandit security scan..."
          pip install bandit
          bandit -r app/ -f json -o bandit-report.json || true
          bandit -r app/ || true
          echo "✅ Bandit scan completed!"

      - name: Run Safety (dependency checker)
        run: |
          echo "🔍 Checking for known vulnerabilities in dependencies..."
          pip install safety
          safety check --json || true
          echo "✅ Safety check completed!"

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: bandit-report.json

  sast:
    runs-on: ubuntu-latest
    name: SAST with CodeQL
    
    permissions:
      contents: read
      security-events: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: python

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2

  container-scan:
    runs-on: ubuntu-latest
    name: Container Image Scanning
    
    permissions:
      contents: read
      packages: read
      security-events: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: devops-learning-api:scan
          cache-from: type=gha

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'devops-learning-api:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Display Trivy results
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'devops-learning-api:scan'
          format: 'table'

  secret-scan:
    runs-on: ubuntu-latest
    name: Secret Scanning
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  permissions-audit:
    runs-on: ubuntu-latest
    name: Permissions Audit
    
    steps:
      - name: Check file permissions
        run: |
          echo "🔐 Checking file permissions..."
          # Check for world-writable files
          echo "Looking for world-writable files..."
          find . -type f -perm -002 -not -path './.git/*' || echo "✅ No world-writable files found"
          
          # Check for world-readable sensitive files
          echo "Looking for sensitive files with open permissions..."
          find . -type f \( -name '*.key' -o -name '*.pem' -o -name '*.secret' \) -not -path './.git/*' || true

      - name: Review GitHub settings
        run: |
          echo "📋 Repository security audit checklist:"
          echo "✓ Review branch protection rules"
          echo "✓ Enable required status checks"
          echo "✓ Require code reviews"
          echo "✓ Dismiss stale PR reviews"
          echo "✓ Enable auto-delete of head branches"
          echo "✓ Enable secret scanning"
          echo "✓ Enable dependabot alerts"
